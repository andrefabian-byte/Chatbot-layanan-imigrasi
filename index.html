<!DOCTYPE html>
<html lang="id">
<head>
    <script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
    window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMO — Bot Informasi Imigrasi Bitung</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-dark: #040b14;
            --navy-mid: #0a192f;
            --navy-grad: linear-gradient(135deg, #040b14 0%, #0a192f 100%);
            --gold: #b8892a;
            --gold-light: #d4af37;
            --gold-grad: linear-gradient(90deg, #b8892a 0%, #e6be6a 100%);
            --teal-light: #12a389;
            --sand: #f5f0e8;
            --white: #ffffff;
            --text-dark: #1a2332;
            --border: #dde5ef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--navy-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--navy-grad);
            border-bottom: 2px solid var(--gold);
            padding: 0 20px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1100;
        }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand-logo {
            width: 38px; height: 38px;
            background: var(--gold-grad);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .brand-name { font-size: 18px; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; }
        .brand-sub { font-size: 10px; color: rgba(255,255,255,0.5); }
        .topbar-right { display: flex; align-items: center; justify-content: flex-end; flex: 1; }
        .topbar-socials { display: flex; align-items: center; }
        .header-social-btn { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 18px; transition: 0.3s; margin: 0 5px; }
        .header-social-btn:hover { color: var(--gold-light); transform: translateY(-2px); }
        .web-link-header { font-size: 12px; color: white; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 10px; }
        .header-logos { display: flex; align-items: center; gap: 12px; padding-left: 15px; border-left: 1px solid rgba(255,255,255,0.1); height: 45px; }
        .header-logos img { height: 100%; width: auto; object-fit: contain; }

        /* ── LAYOUT ── */
        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px;
            background: var(--navy-grad);
            border-right: 1px solid rgba(184,137,42,0.2);
            display: flex; flex-direction: column;
            transition: 0.3s ease; overflow-y: auto;
        }
        .sidebar-label {
            font-size: 10px; font-weight: 700; color: var(--gold);
            text-transform: uppercase; padding: 16px 16px 8px; letter-spacing: 1px;
        }
        .topic-btn {
            width: 90%; margin: 2px 5%; text-align: left; padding: 11px 12px;
            background: transparent; border: none; border-radius: 8px; cursor: pointer;
            color: rgba(255,255,255,0.7); display: flex; align-items: center;
            gap: 10px; font-size: 13px; font-family: inherit; transition: 0.2s;
        }
        .topic-btn:hover { background: rgba(184,137,42,0.1); color: var(--gold-light); }
        .new-chat-btn {
            width: 90%; margin: 12px 5% 4px;
            padding: 11px; background: var(--gold-grad); color: var(--navy-dark);
            border: none; border-radius: 8px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 700;
            display: flex; align-items: center; gap: 8px; justify-content: center;
            transition: 0.2s;
        }
        .new-chat-btn:hover { opacity: 0.85; }
        #chatHistoryList { max-height: 180px; overflow-y: auto; }
        #chatHistoryList::-webkit-scrollbar { width: 3px; }
        #chatHistoryList::-webkit-scrollbar-thumb { background: rgba(184,137,42,0.3); border-radius: 3px; }

        .info-card {
            margin: 12px 16px 16px;
            background: rgba(184,137,42,0.05);
            border-radius: 12px; padding: 14px;
            border: 1px solid rgba(184,137,42,0.2);
        }
        .info-row { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .info-row:last-child { margin-bottom: 0; }
        .clear-btn {
            width: 90%; margin: 0 5% 16px;
            padding: 9px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px; color: rgba(255,255,255,0.35);
            font-family: inherit; font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .clear-btn:hover { background: rgba(192,57,43,0.1); border-color: rgba(192,57,43,0.3); color: #ff8080; }

        /* ── CHAT AREA ── */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--sand); min-width: 0; }
        .messages {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 16px 14px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── BUBBLES ── */
        .msg {
            display: flex;
            gap: 8px;
            /* max-width fluid: di desktop max 72%, di HP otomatis menyempit */
            max-width: min(85%, 680px);
            width: fit-content;
            animation: fadeUp 0.3s ease;
        }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.bot  { align-self: flex-start; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .avatar {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0; margin-top: 2px;
        }
        .avatar.bot { background: var(--gold-grad); }
        .avatar.user-av {
            background: var(--navy-mid);
            border: 1px solid rgba(184,137,42,0.4);
            color: var(--gold-light); font-size: 13px;
        }

        .bubble-wrap {
            display: flex; flex-direction: column;
            /* Biarkan bubble-wrap menyusut mengikuti lebar layar */
            min-width: 0; flex: 1;
        }
        .msg.user .bubble-wrap { align-items: flex-end; }
        .msg.bot  .bubble-wrap { align-items: flex-start; }

        .bubble {
            /* Lebar mengikuti isi teks, tapi tidak melampaui container */
            display: inline-block;
            max-width: 100%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: clamp(13px, 3.5vw, 14px); /* fluid font */
            line-height: 1.7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            word-break: break-word;   /* potong kata panjang */
            overflow-wrap: break-word;
            hyphens: auto;
        }
        .msg.bot .bubble {
            background: white; border-top-left-radius: 3px;
            border: 1px solid var(--border); color: var(--text-dark);
        }
        .msg.user .bubble {
            background: var(--navy-mid); color: white;
            border-top-right-radius: 3px; border: 1px solid var(--gold);
        }
        .bubble b, .bubble strong { font-weight: 600; }
        .bubble a { color: var(--teal-light); word-break: break-all; }
        .bubble ul { padding-left: 16px; margin: 6px 0; }
        .bubble ol { padding-left: 16px; margin: 6px 0; }
        .bubble li { margin-bottom: 4px; }
        .bubble .highlight {
            background: rgba(184,137,42,0.07); border-left: 3px solid var(--gold);
            border-radius: 4px; padding: 8px 12px; margin: 8px 0;
            font-size: clamp(11px, 3vw, 13px); color: #7a5a1a;
            word-break: break-word;
        }
        .msg-time {
            font-size: 10px; color: #aaa;
            margin-top: 4px; padding: 0 3px;
            white-space: nowrap;
        }

        /* Welcome card */
        .welcome-card {
            background: white; border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; max-width: 480px;
            margin: 10px auto; text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .welcome-card h2 { font-size: 20px; font-weight: 700; color: var(--navy-dark); margin-bottom: 6px; }
        .welcome-card p { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 16px; }
        .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .quick-btn {
            padding: 9px 12px; border: 1.5px solid var(--border);
            border-radius: 8px; background: var(--sand); cursor: pointer;
            font-family: inherit; font-size: 12px; font-weight: 500;
            color: var(--text-dark); transition: 0.15s;
            display: flex; align-items: center; gap: 7px; text-align: left;
        }
        .quick-btn:hover { border-color: var(--gold); background: rgba(184,137,42,0.05); color: var(--gold); }

        /* Typing */
        .typing-wrap { display: none; align-items: center; gap: 10px; padding: 0 20px 6px; }
        .typing-wrap.show { display: flex; }
        .typing-dots {
            background: white; border: 1px solid var(--border);
            border-radius: 15px; border-top-left-radius: 3px;
            padding: 12px 16px; display: flex; gap: 5px; align-items: center;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-light); animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

        /* Suggestions */
        .suggestions { padding: 0 20px 10px; display: flex; gap: 7px; flex-wrap: wrap; }
        .sug-btn {
            background: white; border: 1px solid var(--border);
            border-radius: 99px; padding: 6px 13px;
            font-size: 11px; font-weight: 500; color: #666;
            cursor: pointer; font-family: inherit; transition: 0.15s; white-space: nowrap;
        }
        .sug-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* Input */
        .input-area { padding: 12px 16px 14px; background: white; border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-row {
            display: flex; gap: 10px; background: var(--sand);
            padding: 8px 10px 8px 16px; border-radius: 12px;
            border: 1.5px solid var(--border); transition: 0.2s;
        }
        .input-row:focus-within { border-color: var(--gold); }
        #userInput {
            flex: 1; border: none; background: transparent; outline: none;
            resize: none; font-size: 14px; font-family: inherit;
            color: var(--text-dark); max-height: 100px; min-height: 22px; line-height: 1.5;
        }
        #userInput::placeholder { color: #bbb; }
        .send-btn {
            background: var(--navy-dark); color: var(--gold-light);
            border: 1px solid var(--gold); width: 38px; height: 38px;
            border-radius: 9px; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: var(--gold); color: var(--navy-dark); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-hint { font-size: 10px; color: #bbb; text-align: center; margin-top: 7px; }

        /* ── HAPUS CHAT PER ITEM ── */
        .history-item {
            display: flex; align-items: center;
            width: 90%; margin: 2px 5%;
        }
        .history-item .topic-btn {
            width: auto; flex: 1; margin: 0;
        }
        .del-chat-btn {
            background: transparent; border: none; cursor: pointer;
            color: rgba(255,255,255,0.25); font-size: 13px; padding: 6px 8px;
            border-radius: 6px; transition: 0.2s; flex-shrink: 0;
        }
        .del-chat-btn:hover { color: #ff6b6b; background: rgba(255,50,50,0.1); }

        /* ── SIDEBAR OVERLAY ── */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1150;
        }
        .sidebar-overlay.show { display: block; }

        /* ── MENU TOGGLE ── */
        .menu-toggle {
            display: none; background: transparent; border: none;
            color: white; font-size: 22px; cursor: pointer;
            margin-right: 10px; padding: 4px 6px; flex-shrink: 0;
        }

        /* ── TABLET: 768px – 1024px ── */
        @media (max-width: 1024px) {
            .sidebar { width: 220px; }
            .web-link-header span { display: none; }
            .header-logos { height: 36px; }
        }

        /* ── MOBILE: ≤ 768px ── */
        @media (max-width: 768px) {
            /* Penting: pakai dvh agar tidak tertutup keyboard virtual */
            body { height: 100dvh; }

            /* Topbar — tetap tampilkan logo & sosial */
            .topbar { padding: 0 10px; height: 58px; }
            .menu-toggle { display: block; }
            .brand-logo { width: 30px; height: 30px; font-size: 16px; }
            .brand-name { font-size: 13px; letter-spacing: 0.5px; }
            .brand-sub { display: none; }

            /* Link website sembunyikan teks, sisakan ikon */
            .web-link-header span { display: none; }
            .web-link-header { font-size: 16px; }
            .header-divider { margin: 0 6px; }
            .header-social-btn { font-size: 16px; margin: 0 3px; }

            /* Logo tetap tampil, lebih kecil */
            .header-logos {
                padding-left: 8px; gap: 6px;
                height: 30px; border-left: 1px solid rgba(255,255,255,0.1);
            }
            .header-logos img { height: 30px; }

            /* Sidebar drawer */
            .sidebar {
                position: fixed;
                left: -270px; top: 58px; bottom: 0;
                width: 260px; z-index: 1200;
                box-shadow: 4px 0 24px rgba(0,0,0,0.5);
                transition: left 0.28s ease;
            }
            .sidebar.active { left: 0; }

            /* Chat messages */
            .messages { padding: 12px; gap: 10px; }
            .msg { max-width: 93%; }
            .bubble { font-size: 13px; padding: 10px 13px; }
            .avatar { width: 28px; height: 28px; font-size: 13px; }

            /* Welcome card */
            .welcome-card { padding: 16px; margin: 6px; }
            .welcome-card h2 { font-size: 16px; }
            .welcome-card p { font-size: 12px; margin-bottom: 12px; }
            .quick-grid { grid-template-columns: 1fr; gap: 6px; }
            .quick-btn { font-size: 12px; padding: 10px 12px; }

            /* Typing */
            .typing-wrap { padding: 0 12px 6px; }

            /* Suggestions — scroll horizontal */
            .suggestions {
                padding: 4px 12px 8px;
                overflow-x: auto; flex-wrap: nowrap;
            }
            .suggestions::-webkit-scrollbar { display: none; }
            .sug-btn { font-size: 11px; padding: 6px 11px; flex-shrink: 0; }

            /* Input area — pakai padding-bottom safe area agar tidak tertutup */
            .input-area {
                padding: 10px 12px 10px;
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
            #userInput { font-size: 16px; } /* 16px agar iOS tidak auto-zoom */
            .send-btn { width: 38px; height: 38px; }
            .input-hint { font-size: 9px; margin-top: 5px; }
        }

        /* ── SMALL MOBILE: ≤ 400px ── */
        @media (max-width: 400px) {
            .topbar { padding: 0 8px; }
            .brand-name { font-size: 12px; }
            .bubble { font-size: 12px; }
            .msg { max-width: 96%; }
        }
    </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div style="display:flex;align-items:center;">
        <button class="menu-toggle" onclick="toggleSidebar()" id="menuBtn">☰</button>
        <div class="brand">
            <div class="brand-logo">🛂</div>

                <div class="brand-name">BIMO</div>

</div>

<!-- Overlay sidebar mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> Chat Baru</button>

        <div class="sidebar-label">Riwayat Chat</div>

        <div class="sidebar-label">Layanan Utama</div>

        <button class="topic-btn" onclick="askTopic('paspor hilang')"><i class="fas fa-exclamation-triangle"></i> Paspor Hilang</button>
        <button class="topic-btn" onclick="askTopic('cara pakai mpaspor daftar online')"><i class="fas fa-mobile-alt"></i> M-Paspor</button>
        <button class="topic-btn" onclick="askTopic('syarat paspor anak bawah umur')"><i class="fas fa-child"></i> Paspor Anak</button>
        <button class="topic-btn" onclick="askTopic('apa itu epaspor elektronik')"><i class="fas fa-microchip"></i> E-Paspor</button>
        <button class="topic-btn" onclick="askTopic('jam buka kantor operasional')"><i class="fas fa-clock"></i> Jam & Kuota</button>

        <div class="info-card">
            <div style="font-size:11px;font-weight:700;color:var(--gold-light);margin-bottom:10px;"><i class="fas fa-building"></i> Imigrasi Bitung</div>
            <div class="info-row"><i class="fas fa-map-marker-alt"></i> Jl. Samratulangi, Bitung Tengah</div>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">

        <div class="typing-wrap" id="typingWrap">

        <div class="suggestions" id="suggestions">

            <button class="sug-btn" onclick="askTopic('perpanjang paspor beda kantor')">📍 Beda kantor bisa?</button>
            <button class="sug-btn" onclick="askTopic('paspor hampir kadaluarsa')">🔄 Paspor mau habis?</button>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="userInput" placeholder="Ketik pertanyaan Anda di sini..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>

                    <i class="fas fa-paper-plane"></i>

<script>
// ════════════════════════════════════════════════════════
//  DATABASE PENGETAHUAN BIMO
//  Setiap item: keywords (teks untuk Fuse.js) + answer
// ════════════════════════════════════════════════════════
const KB = [
  {
    id: 'salam',
    keywords: 'halo hai hello hi selamat pagi siang sore malam apa kabar perkenalan',
    answer: `Halo! 👋 Selamat datang di <b>BIMO</b>, Bot Informasi Imigrasi Bitung.<br><br>
Saya siap membantu Anda dengan informasi seputar:<br>
<ul>
  <li>🛂 Paspor baru &amp; perpanjangan</li>
  <li>💳 Biaya dan prosedur layanan</li>
  <li>📱 Aplikasi M-Paspor</li>
  <li>🚨 Paspor hilang atau rusak</li>
</ul>
Silakan pilih menu di samping atau langsung ketik pertanyaan Anda! 😊`
  },
  {
    id: 'paspor_baru',
    keywords: 'syarat paspor baru pertama kali buat bikin dokumen persyaratan ketentuan permohonan',
    answer: `<b>🛂 Syarat Pembuatan Paspor Baru:</b><br><br>
<b>Dokumen Wajib (Asli):</b><br>
<ul>

//  INISIALISASI FUSE.JS
// ════════════════════════════════════════════════════════
const fuse = new Fuse(KB, {
    keys: ['keywords'],
    threshold: 0.42,
    minMatchCharLength: 2,
    includeScore: true,
    ignoreLocation: true,
});

// ════════════════════════════════════════════════════════
//  STATE & UTILS
// ════════════════════════════════════════════════════════
let isTyping = false;
let currentChatId = localStorage.getItem('bimo_last_id') || Date.now().toString();

function getTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}
function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    if (sb.classList.contains('active')) closeSidebar();
    else openSidebar();
}
function openSidebar() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('sidebarOverlay').classList.add('show');
    document.getElementById('menuBtn').innerHTML = '✕';
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('sidebarOverlay').classList.remove('show');
    document.getElementById('menuBtn').innerHTML = '☰';
}

// ════════════════════════════════════════════════════════
//  RENDER PESAN
// ════════════════════════════════════════════════════════
function appendMessage(role, html) {
    const container = document.getElementById('messages');
    const wc = document.getElementById('welcomeCard');
    if (wc) wc.remove();

    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (role === 'user' ? 'user-av' : 'bot');
    avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '🛂';

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);

    if (role === 'user') {
        msgDiv.appendChild(wrap);
        msgDiv.appendChild(avatar);
    } else {
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(wrap);
    }

    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
    saveChat();
}

// ════════════════════════════════════════════════════════
//  MESIN PENCARI JAWABAN (Fuse.js fuzzy + multi-token)
// ════════════════════════════════════════════════════════
function findAnswer(userText) {
    const cleaned = userText.toLowerCase()
        .replace(/[?!.,;:]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

    // Coba match seluruh kalimat dulu
    let results = fuse.search(cleaned);
    if (results.length && results[0].score <= 0.42) {
        return results[0].item.answer;
    }

    // Fallback: akumulasi skor per token
    const words = cleaned.split(' ').filter(w => w.length > 2);
    const scoreMap = {};
    for (const word of words) {
        const r = fuse.search(word);
        for (const item of r) {
            if (!scoreMap[item.item.id]) scoreMap[item.item.id] = 0;
            scoreMap[item.item.id] += (1 - item.score);
        }
    }
    const best = Object.entries(scoreMap).sort((a, b) => b[1] - a[1]);
    if (best.length && best[0][1] > 0.5) {
        const found = KB.find(k => k.id === best[0][0]);
        if (found) return found.answer;
    }

    // Tidak ditemukan
    return `Maaf, saya belum menemukan informasi yang tepat untuk pertanyaan tersebut. 🙏<br><br>
Coba tanyakan dengan kata kunci seperti:<br>
<ul>
  <li>📋 <b>"Syarat paspor baru"</b></li>
  <li>💳 <b>"Biaya paspor"</b></li>
  <li>📱 <b>"Cara pakai M-Paspor"</b></li>
  <li>🚨 <b>"Paspor hilang"</b></li>
</ul>
Atau hubungi kami langsung di <b>(0438) 21077</b>.`;
}

function showTyping() {
    document.getElementById('typingWrap').classList.add('show');
    document.getElementById('messages').scrollTop = 99999;

function hideTyping() {

// ════════════════════════════════════════════════════════
//  KIRIM PESAN
// ════════════════════════════════════════════════════════
async function sendMessage(overrideText) {
    const input = document.getElementById('userInput');
    const text = (overrideText || input.value).trim();
    if (!text || isTyping) return;

    input.value = '';
    input.style.height = 'auto';
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;

    appendMessage('user', text);

    if (window.innerWidth <= 768 && !overrideText) {
        closeSidebar();
    }

    showTyping();
    rotateSuggestions();

    await new Promise(r => setTimeout(r, 500 + Math.random() * 500));

    hideTyping();
    appendMessage('bot', findAnswer(text));

    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
}

function askTopic(q) { sendMessage(q); }

function rotateSuggestions() {
    sugIdx = (sugIdx + 1) % SUGS.length;
    document.getElementById('suggestions').innerHTML =

}

//  RIWAYAT CHAT (localStorage)
// ════════════════════════════════════════════════════════
function saveChat() {
    const html = document.getElementById('messages').innerHTML;
    if (!html.trim() || html.includes('welcome-card')) return; // Jangan simpan jika kosong/hanya welcome card

    let all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');
    all[currentChatId] = {
        html,
        timestamp: new Date().toLocaleString('id-ID', { 
            day: '2-digit', 
            month: 'short', 
            hour: '2-digit', 
            minute: '2-digit' 
        })
    };

    localStorage.setItem('bimo_all_chats', JSON.stringify(all));
    localStorage.setItem('bimo_last_id', currentChatId);
    
    renderChatList(); // PENTING: Update sidebar setiap kali ada pesan baru
}

function renderChatList() {
    const list = document.getElementById('chatHistoryList');
    if (!list) return;

    // Ambil data dari local storage
    let all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');
    list.innerHTML = '';

    const ids = Object.keys(all).reverse(); // Riwayat terbaru di atas
    
    if (ids.length === 0) {
        list.innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.25);padding:12px 16px;">Belum ada riwayat</div>';
        return;
    }

    ids.forEach(id => {
        const item = document.createElement('div');
        item.className = 'history-item';
        
        // Cek apakah ini chat yang sedang dibuka untuk memberi efek highlight
        const activeStyle = (id === currentChatId) ? 'opacity: 1; background: rgba(184,137,42,0.1);' : 'opacity: 0.6;';

        item.innerHTML = `
            <button class="topic-btn" style="${activeStyle} flex: 1; margin: 0;" onclick="loadSpecificChat('${id}')">
                <i class="fas fa-comment-alt"></i> ${all[id].timestamp}
            </button>
            <button class="del-chat-btn" onclick="deleteSingleChat('${id}')">
                <i class="fas fa-times"></i>
            </button>
        `;
        list.appendChild(item);
    });
}

function deleteSingleChat(id) {
    let all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');
    delete all[id];
    localStorage.setItem('bimo_all_chats', JSON.stringify(all));

    // Jika yang dihapus adalah chat yang sedang dibuka, buat chat baru
    if (id === currentChatId) {
        newChat();
    } else {
        renderChatList();
    }
}

function clearAllHistory() {
    if (!confirm('Hapus semua riwayat chat?')) return;
    localStorage.clear(); // Bersihkan semua
    newChat();
}

function loadLastChat() {
    const lastId = localStorage.getItem('bimo_last_id');
    const all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');
    if (lastId && all[lastId]) {
        currentChatId = lastId;
        document.getElementById('messages').innerHTML = all[lastId].html;
        document.getElementById('messages').scrollTop = 99999;
    } else {
        showWelcome();
    }
}

function newChat() {
    // Berikan ID unik baru agar tidak menimpa chat lama
    currentChatId = Date.now().toString();
    localStorage.setItem('bimo_last_id', currentChatId);
    
    // Bersihkan layar chat
    document.getElementById('messages').innerHTML = '';
    
    showWelcome();      // Tampilkan kartu sambutan
    renderChatList();   // WAJIB: Agar riwayat chat sebelumnya muncul di kiri
    
    if (window.innerWidth <= 768) closeSidebar();
}
function showWelcome() {
    const container = document.getElementById('messages');
    const wc = document.createElement('div');
    wc.className = 'welcome-card'; wc.id = 'welcomeCard';
    wc.innerHTML = `
        <div style="font-size:40px;margin-bottom:10px;">🛂</div>
        <h2>Halo! Saya BIMO</h2>
        <p>Bot Informasi Imigrasi Bitung siap membantu Anda 24 jam seputar paspor, visa, dan layanan keimigrasian.</p>
        <div class="quick-grid">
            <button class="quick-btn" onclick="askTopic('syarat paspor baru')">🛂 Syarat paspor baru</button>
            <button class="quick-btn" onclick="askTopic('biaya paspor pnbp')">💳 Biaya paspor</button>
            <button class="quick-btn" onclick="askTopic('cara pakai mpaspor daftar online')">📱 Cara pakai M-Paspor</button>
            <button class="quick-btn" onclick="askTopic('paspor hilang')">🚨 Paspor hilang</button>

}

function clearAllHistory() {
    if (!confirm('Hapus semua riwayat chat?')) return;
    localStorage.removeItem('bimo_all_chats');
    localStorage.removeItem('bimo_last_id');
    currentChatId = Date.now().toString();
    document.getElementById('messages').innerHTML = '';
    renderChatList();
    showWelcome();
}

function loadSpecificChat(id) {
    let all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');
    if (all[id]) {
        currentChatId = id;
        localStorage.setItem('bimo_last_id', id);
        document.getElementById('messages').innerHTML = all[id].html;
        renderChatList(); // Update highlight di sidebar
        if (window.innerWidth <= 768) closeSidebar();
    }
}

// ── START ──
window.addEventListener('load', () => {
    const lastId = localStorage.getItem('bimo_last_id');
    const all = JSON.parse(localStorage.getItem('bimo_all_chats') || '{}');

    if (lastId && all[lastId]) {
        currentChatId = lastId;
        document.getElementById('messages').innerHTML = all[lastId].html;
    } else {
        newChat(); // Jika kosong, buat sesi baru
    }
    
    renderChatList(); // Tampilkan riwayat di sidebar
});
</script>
