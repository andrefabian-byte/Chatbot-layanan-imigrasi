<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIMO — Bot Informasi Imigrasi Bitung</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Stylesheet BIMO -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div style="display:flex;align-items:center;">
        <button class="menu-toggle" onclick="toggleSidebar()" id="menuBtn">☰</button>
        <div class="brand">
            <div class="brand-logo">🛂</div>
            <div>
                <div class="brand-name">BIMO</div>
                <div class="brand-sub">Bot Informasi · Imigrasi Bitung</div>
            </div>
        </div>
    </div>
    <div class="topbar-right">
        <div class="topbar-socials">
            <a href="https://bitung.imigrasi.go.id" target="_blank" class="web-link-header">
                <i class="fas fa-globe"></i> <span>bitung.imigrasi.go.id</span>
            </a>
            <div class="header-divider"></div>
            <a href="https://www.instagram.com/imigrasi_bitung" target="_blank" class="header-social-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/kanim.bitung" target="_blank" class="header-social-btn"><i class="fab fa-facebook-f"></i></a>
        </div>
        <div class="header-logos">
            <img src="kemenipas.png" alt="Logo Kemenkumham">
            <img src="imigrasi.png" alt="Logo Imigrasi">
        </div>
    </div>
</div>

<!-- Overlay sidebar mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> Chat Baru</button>

        <div class="sidebar-label">Riwayat Chat</div>
        <div id="chatHistoryList"></div>
        <button class="clear-btn" onclick="clearAllHistory()"><i class="fas fa-trash-alt"></i> Hapus Semua Riwayat</button>

        <div class="sidebar-label">Layanan Utama</div>
        <button class="topic-btn" onclick="askTopic('syarat paspor baru')"><i class="fas fa-id-card"></i> Paspor Baru</button>
        <button class="topic-btn" onclick="askTopic('cara perpanjang paspor')"><i class="fas fa-sync"></i> Perpanjangan</button>
        <button class="topic-btn" onclick="askTopic('biaya paspor pnbp')"><i class="fas fa-wallet"></i> Biaya & PNBP</button>
        <button class="topic-btn" onclick="askTopic('paspor hilang')"><i class="fas fa-exclamation-triangle"></i> Paspor Hilang</button>
        <button class="topic-btn" onclick="askTopic('cara pakai mpaspor daftar online')"><i class="fas fa-mobile-alt"></i> M-Paspor</button>
        <button class="topic-btn" onclick="askTopic('syarat paspor anak bawah umur')"><i class="fas fa-child"></i> Paspor Anak</button>
        <button class="topic-btn" onclick="askTopic('apa itu epaspor elektronik')"><i class="fas fa-microchip"></i> E-Paspor</button>
        <button class="topic-btn" onclick="askTopic('jam buka kantor operasional')"><i class="fas fa-clock"></i> Jam & Kuota</button>

        <div class="info-card">
            <div style="font-size:11px;font-weight:700;color:var(--gold-light);margin-bottom:10px;"><i class="fas fa-building"></i> Imigrasi Bitung</div>
            <div class="info-row"><i class="fas fa-map-marker-alt"></i> Jl. Samratulangi, Bitung Tengah</div>
            <div class="info-row"><i class="fas fa-phone"></i> (0438) 21077</div>
            <div class="info-row"><i class="fas fa-clock"></i> Sen–Jum, 08.00–16.00 WITA</div>
            <div class="info-row"><i class="fas fa-globe"></i> bitung.imigrasi.go.id</div>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
        <div class="messages" id="messages"></div>

        <div class="typing-wrap" id="typingWrap">
            <div style="width:32px;height:32px;background:var(--gold-grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">🛂</div>
            <div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>

        <div class="suggestions" id="suggestions">
            <button class="sug-btn" onclick="askTopic('berapa lama proses paspor')">⏱️ Lama proses?</button>
            <button class="sug-btn" onclick="askTopic('beda epaspor paspor biasa')">📱 E-paspor vs biasa?</button>
            <button class="sug-btn" onclick="askTopic('perpanjang paspor beda kantor')">📍 Beda kantor bisa?</button>
            <button class="sug-btn" onclick="askTopic('paspor hampir kadaluarsa')">🔄 Paspor mau habis?</button>
        </div>

        <div class="input-area">
            <div class="input-row">
                <textarea id="userInput" placeholder="Ketik pertanyaan Anda di sini..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Kirim">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-hint">BIMO · Bot Informasi Imigrasi Bitung — Tersedia 24 Jam</div>
        </div>
    </div>
</div>

<!-- Fuse.js (fuzzy search) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<!-- Script BIMO -->
<script src="script.js"></script>

</body>
</html>
